services:
  - type: web
    name: studynk-api
    runtime: python
    region: eu-west
    rootDir: backend
    buildCommand: pip install -r requirements-render.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: MONGO_URL
        sync: false
      - key: DB_NAME
        value: studynk_db
      - key: JWT_SECRET
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: SMTP_EMAIL
        value: studynk0@outlook.com
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_SERVER
        value: smtp-mail.outlook.com
      - key: SMTP_PORT
        value: "587"
      - key: ADMIN_EMAIL
        value: admin@studynk.com
      - key: ADMIN_PASSWORD
        sync: false
      - key: Maps_API_KEY
        sync: false
